<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pour Kamissa 💛</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --joy:       #F9C846;
      --joy-dark:  #E0A800;
      --joy-bg:    #FFFBEC;
      --sad:       #6BA3BE;
      --sad-dark:  #3E7A9E;
      --sad-bg:    #EBF4FA;
      --anger:     #E05C5C;
      --anger-dark:#B83535;
      --anger-bg:  #FDF0F0;
      --bored:     #9B8BB4;
      --bored-dark:#6E5A8E;
      --bored-bg:  #F3EFF8;
      --dua:       #C4A35A;
      --dua-dark:  #8B6914;
      --dua-bg:    #FDF8EE;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: #FAFAF7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .logo {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 10px;
      animation: spin-bloom 6s ease-in-out infinite;
      filter: drop-shadow(0 4px 16px #f9a8d4aa);
      line-height: 1;
    }
    @keyframes spin-bloom {
      0%, 100% { transform: scale(1) rotate(0deg); }
      30%       { transform: scale(1.12) rotate(8deg); }
      60%       { transform: scale(1.06) rotate(-5deg); }
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 60px 20px 40px;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #FFF3C4 0%, transparent 70%);
      pointer-events: none;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      color: #2A2A2A;
      line-height: 1.1;
    }
    header h1 em {
      font-style: italic;
      color: var(--joy-dark);
    }
    header p {
      margin-top: 14px;
      font-size: 1.05rem;
      color: #777;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
      font-size: 1.2rem;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 28px 60px;
    }

    /* ── EMOTION CARD ── */
    .card {
      border-radius: 28px;
      padding: 36px 30px 32px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease;
      border: 2px solid transparent;
      background: #fff;
      user-select: none;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }
    .card:hover { transform: translateY(-6px) scale(1.02); }
    .card:hover::before { opacity: 1; }
    .card:active { transform: scale(0.97); }

    /* per-emotion colours */
    .card[data-emotion="joy"]   { background: var(--joy-bg);   border-color: var(--joy);   box-shadow: 0 4px 24px #F9C84622; }
    .card[data-emotion="joy"]::before   { background: radial-gradient(circle at 70% 20%, #F9C84633, transparent 70%); }
    .card[data-emotion="sad"]   { background: var(--sad-bg);   border-color: var(--sad);   box-shadow: 0 4px 24px #6BA3BE22; }
    .card[data-emotion="sad"]::before   { background: radial-gradient(circle at 70% 20%, #6BA3BE33, transparent 70%); }
    .card[data-emotion="anger"] { background: var(--anger-bg); border-color: var(--anger); box-shadow: 0 4px 24px #E05C5C22; }
    .card[data-emotion="anger"]::before { background: radial-gradient(circle at 70% 20%, #E05C5C33, transparent 70%); }
    .card[data-emotion="bored"] { background: var(--bored-bg); border-color: var(--bored); box-shadow: 0 4px 24px #9B8BB422; }
    .card[data-emotion="bored"]::before { background: radial-gradient(circle at 70% 20%, #9B8BB433, transparent 70%); }
    .card[data-emotion="lazy"]  { background: var(--lazy-bg);  border-color: var(--lazy);  box-shadow: 0 4px 24px #6DBF8222; }
    .card[data-emotion="lazy"]::before  { background: radial-gradient(circle at 70% 20%, #6DBF8233, transparent 70%); }
    .card[data-emotion="dua"]   { background: var(--dua-bg);   border-color: var(--dua);   box-shadow: 0 4px 24px #C4A35A22; }
    .card[data-emotion="dua"]::before   { background: radial-gradient(circle at 70% 20%, #C4A35A33, transparent 70%); }

    .card:hover[data-emotion="joy"]   { box-shadow: 0 12px 40px #F9C84640; }
    .card:hover[data-emotion="sad"]   { box-shadow: 0 12px 40px #6BA3BE40; }
    .card:hover[data-emotion="anger"] { box-shadow: 0 12px 40px #E05C5C40; }
    .card:hover[data-emotion="bored"] { box-shadow: 0 12px 40px #9B8BB440; }
    .card:hover[data-emotion="lazy"]  { box-shadow: 0 12px 40px #6DBF8240; }
    .card:hover[data-emotion="dua"]   { box-shadow: 0 12px 40px #C4A35A40; }

    .card-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 14px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.12));
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    .card:hover .card-emoji { transform: scale(1.18) rotate(-5deg); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card[data-emotion="joy"]   .card-title { color: var(--joy-dark); }
    .card[data-emotion="sad"]   .card-title { color: var(--sad-dark); }
    .card[data-emotion="anger"] .card-title { color: var(--anger-dark); }
    .card[data-emotion="bored"] .card-title { color: var(--bored-dark); }
    .card[data-emotion="lazy"]  .card-title { color: var(--lazy-dark); }
    .card[data-emotion="dua"]   .card-title { color: var(--dua-dark); }

    .card-sub {
      font-size: 0.88rem;
      color: #999;
      font-weight: 300;
      letter-spacing: 0.03em;
      margin-bottom: 16px;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border: none;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      pointer-events: none; /* card itself is clickable */
    }
    .card[data-emotion="joy"]   .card-btn { background: var(--joy);   color: #5a4000; }
    .card[data-emotion="sad"]   .card-btn { background: var(--sad);   color: #fff; }
    .card[data-emotion="anger"] .card-btn { background: var(--anger); color: #fff; }
    .card[data-emotion="bored"] .card-btn { background: var(--bored); color: #fff; }
    .card[data-emotion="lazy"]  .card-btn { background: var(--lazy);  color: #fff; }
    .card[data-emotion="dua"]   .card-btn { background: var(--dua);   color: #fff; }

    .card:hover .card-btn { transform: scale(1.05); }

    /* ── MODAL OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
      backdrop-filter: blur(0px);
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
      backdrop-filter: blur(6px);
    }
    .overlay-bg {
      position: absolute;
      inset: 0;
      background: rgba(20, 20, 20, 0.45);
    }

    /* ── MODAL BOX ── */
    .modal {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      border-radius: 32px;
      padding: 48px 42px 40px;
      background: #fff;
      text-align: center;
      transform: translateY(40px) scale(0.95);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 30px 80px rgba(0,0,0,.18);
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-message {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #444;
      font-weight: 300;
      white-space: pre-line;
    }

    .modal-close {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 34px;
      border-radius: 50px;
      border: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      color: #fff;
    }
    .modal-close:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,.15); }

    /* ── per-emotion modal colours ── */
    .modal[data-emotion="joy"]   { border-top: 6px solid var(--joy); }
    .modal[data-emotion="joy"]   .modal-title { color: var(--joy-dark); }
    .modal[data-emotion="joy"]   .modal-close { background: var(--joy); color: #5a4000; }

    .modal[data-emotion="sad"]   { border-top: 6px solid var(--sad); }
    .modal[data-emotion="sad"]   .modal-title { color: var(--sad-dark); }
    .modal[data-emotion="sad"]   .modal-close { background: var(--sad); }

    .modal[data-emotion="anger"] { border-top: 6px solid var(--anger); }
    .modal[data-emotion="anger"] .modal-title { color: var(--anger-dark); }
    .modal[data-emotion="anger"] .modal-close { background: var(--anger); }

    .modal[data-emotion="bored"] { border-top: 6px solid var(--bored); }
    .modal[data-emotion="bored"] .modal-title { color: var(--bored-dark); }
    .modal[data-emotion="bored"] .modal-close { background: var(--bored); }

    .modal[data-emotion="lazy"]  { border-top: 6px solid var(--lazy); }
    .modal[data-emotion="lazy"]  .modal-title { color: var(--lazy-dark); }
    .modal[data-emotion="lazy"]  .modal-close { background: var(--lazy); }

    .modal[data-emotion="dua"]   { border-top: 6px solid var(--dua); }
    .modal[data-emotion="dua"]   .modal-title { color: var(--dua-dark); }
    .modal[data-emotion="dua"]   .modal-close { background: var(--dua); }

    .dua-arabic {
      font-size: 1.5rem;
      line-height: 2.2;
      direction: rtl;
      font-family: 'Georgia', serif;
      color: var(--dua-dark);
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }
    .dua-translation {
      font-size: 0.95rem;
      color: #666;
      font-style: italic;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .dua-source {
      font-size: 0.78rem;
      color: #bbb;
      letter-spacing: 0.04em;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: #bbb;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }
    footer span { color: #E05C5C; }

    /* ── ENTRANCE ANIMATIONS ── */
    .card {
      opacity: 0;
      animation: rise 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.25s; }
    .card:nth-child(4) { animation-delay: 0.35s; }
    .card:nth-child(5) { animation-delay: 0.45s; }
    .card:nth-child(6) { animation-delay: 0.55s; }

    /* ── PARTICLES (subtle) ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.18;
      animation: drift linear infinite;
    }
    @keyframes drift {
      from { transform: translateY(100vh) rotate(0deg); }
      to   { transform: translateY(-120px) rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <div class="logo">🌸</div>
  <h1>Bonjour <em>Kamissa</em></h1>
  <p>Comment tu te sens en ce moment ?</p>
  <div class="stars">✦ ✦ ✦</div>
</header>

<main class="grid">

  <div class="card" data-emotion="joy" onclick="openModal('joy')">
    <span class="card-emoji">🌟</span>
    <div class="card-title">Je suis heureuse</div>

    <button class="card-btn">Ouvrir ✨</button>
  </div>

  <div class="card" data-emotion="sad" onclick="openModal('sad')">
    <span class="card-emoji">🌧️</span>
    <div class="card-title">Je suis triste</div>

    <button class="card-btn">Ouvrir 💙</button>
  </div>

  <div class="card" data-emotion="anger" onclick="openModal('anger')">
    <span class="card-emoji">🔥</span>
    <div class="card-title">Je suis en colère</div>

    <button class="card-btn">Ouvrir 🌋</button>
  </div>

  <div class="card" data-emotion="bored" onclick="openModal('bored')">
    <span class="card-emoji">🌀</span>
    <div class="card-title">Je m'ennuie</div>

    <button class="card-btn">Ouvrir 💜</button>
  </div>

  <div class="card" data-emotion="lazy" onclick="openModal('lazy')">
    <span class="card-emoji">🌿</span>
    <div class="card-title">Je suis paresseuse</div>

    <button class="card-btn">Ouvrir 🍃</button>
  </div>

  <div class="card" data-emotion="dua" onclick="openModal('dua')">
    <span class="card-emoji">🤲🏾</span>
    <div class="card-title">Une dua pour moi</div>

    <button class="card-btn">Ouvrir ✨</button>
  </div>

</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="overlay-bg"></div>
  <div class="modal" id="modal">
    <span class="modal-emoji" id="modal-emoji"></span>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-message" id="modal-message"></div>
    <button class="modal-close" onclick="closeModal()">Fermer ✕</button>
  </div>
</div>

<footer>fait avec <span>♥</span> rien que pour toi</footer>

    dua: {
      emoji: '🤲🏾',

        { arabic: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ", translation: "Seigneur, accorde-nous le bien ici-bas et le bien dans l'au-delà, et préserve-nous du châtiment du feu.", source: "Sourate Al-Baqara 2:201" },
        { arabic: "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي", translation: "Ô Allah, Tu es le Pardonneur, Tu aimes pardonner, alors pardonne-moi.", source: "Rapporté par At-Tirmidhi" },
        { arabic: "حَسْبِيَ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ", translation: "Allah me suffit, il n'y a de dieu que Lui. C'est en Lui que je place ma confiance. Il est le Seigneur du Trône immense.", source: "Sourate At-Tawba 9:129" },
        { arabic: "رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي", translation: "Seigneur, ouvre ma poitrine, facilite-moi ma tâche.", source: "Sourate Ta-Ha 20:25-26" },
        { arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ", translation: "Ô Allah, je Te demande la santé et le bien-être ici-bas et dans l'au-delà.", source: "Rapporté par Abu Dawud" },
        { arabic: "لَا إِلَهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ", translation: "Il n'y a de dieu que Toi, gloire à Toi ! J'ai vraiment été du nombre des injustes.", source: "Sourate Al-Anbiya 21:87 — dua de Yunus (as)" },
        { arabic: "رَبِّ إِنِّي لِمَا أَنزَلْتَ إِلَيَّ مِنْ خَيْرٍ فَقِيرٌ", translation: "Seigneur, j'ai besoin de tout bien que Tu feras descendre sur moi.", source: "Sourate Al-Qasas 28:24 — dua de Musa (as)" },
        { arabic: "اللَّهُمَّ لَا سَهْلَ إِلَّا مَا جَعَلْتَهُ سَهْلًا وَأَنْتَ تَجْعَلُ الْحَزَنَ إِذَا شِئْتَ سَهْلًا", translation: "Ô Allah, rien n'est facile sauf ce que Tu rends facile, et Tu peux rendre la tristesse facile si Tu le veux.", source: "Rapporté par Ibn Hibban" },
        { arabic: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ", translation: "Ô Allah, je me réfugie en Toi contre l'anxiété et la tristesse.", source: "Rapporté par Al-Bukhari" },
        { arabic: "رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا وَهَبْ لَنَا مِن لَّدُنكَ رَحْمَةً", translation: "Seigneur, ne laisse pas nos cœurs dévier après que Tu nous as guidés. Accorde-nous Ta miséricorde.", source: "Sourate Al-Imran 3:8" },
        { arabic: "اللَّهُمَّ أَصْلِحْ لِي دِينِي الَّذِي هُوَ عِصْمَةُ أَمْرِي وَأَصْلِحْ لِي دُنْيَايَ", translation: "Ô Allah, améliore pour moi ma religion qui protège mes affaires, et améliore ma vie en ce monde.", source: "Rapporté par Muslim" },
        { arabic: "يَا مُقَلِّبَ الْقُلُوبِ ثَبِّتْ قَلْبِي عَلَى دِينِكَ", translation: "Ô Celui qui retourne les cœurs, affermis mon cœur sur Ta religion.", source: "Rapporté par At-Tirmidhi" },
        { arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ حُبَّكَ وَحُبَّ مَنْ يُحِبُّكَ", translation: "Ô Allah, je Te demande Ton amour et l'amour de ceux qui T'aiment.", source: "Rapporté par At-Tirmidhi" },
        { arabic: "رَبِّ أَعِنِّي وَلَا تُعِنْ عَلَيَّ وَانْصُرْنِي وَلَا تَنْصُرْ عَلَيَّ", translation: "Seigneur, aide-moi et ne permets pas qu'on m'aide contre moi. Soutiens-moi et ne permets pas qu'on me combatte.", source: "Rapporté par Abu Dawud" },
        { arabic: "اللَّهُمَّ اغْفِرْ لِي وَارْحَمْنِي وَاهْدِنِي وَعَافِنِي وَارْزُقْنِي", translation: "Ô Allah, pardonne-moi, aie pitié de moi, guide-moi, préserve-moi et pourvois à mes besoins.", source: "Rapporté par Muslim" },
        { arabic: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ سُبْحَانَ اللَّهِ الْعَظِيمِ", translation: "Gloire à Allah et à Sa louange. Gloire à Allah, le Très Grand.", source: "Rapporté par Al-Bukhari et Muslim" },
        { arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْجَنَّةَ وَأَعُوذُ بِكَ مِنَ النَّارِ", translation: "Ô Allah, je Te demande le Paradis et je me réfugie en Toi contre le Feu.", source: "Rapporté par Abu Dawud" },
        { arabic: "رَبِّ زِدْنِي عِلْمًا", translation: "Seigneur, accroît mes connaissances.", source: "Sourate Ta-Ha 20:114" },
        { arabic: "اللَّهُمَّ إِنِّي ظَلَمْتُ نَفْسِي ظُلْمًا كَثِيرًا وَلَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنتَ فَاغْفِرْ لِي", translation: "Ô Allah, j'ai été injuste envers moi-même d'une grande injustice. Nul ne pardonne les péchés sauf Toi, alors pardonne-moi.", source: "Rapporté par Al-Bukhari" },
        { arabic: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنتَ خَلَقْتَنِي وَأَنَا عَبْدُكَ", translation: "Ô Allah, Tu es mon Seigneur, il n'y a de dieu que Toi. Tu m'as créé et je suis Ton serviteur.", source: "Rapporté par Al-Bukhari — Sayyid Al-Istighfar" },
        { arabic: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ", translation: "Au nom d'Allah, avec Son nom, rien ne peut causer de tort ni sur Terre ni dans le ciel. Il est l'Entendant, l'Omniscient.", source: "Rapporté par Abu Dawud et At-Tirmidhi" },
        { arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا وَرِزْقًا طَيِّبًا وَعَمَلًا مُتَقَبَّلًا", translation: "Ô Allah, je Te demande une science utile, une subsistance bonne et une œuvre acceptée.", source: "Rapporté par Ibn Majah" }
      ]
    }
  };

  function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function openModal(emotion) {
    const data = emotions[emotion];
    const modal = document.getElementById('modal');
    const overlay = document.getElementById('overlay');

    modal.setAttribute('data-emotion', emotion);
    document.getElementById('modal-emoji').textContent = data.emoji;
    document.getElementById('modal-title').textContent = data.title;

    if (emotion === 'dua') {
      const dua = data.duas[Math.floor(Math.random() * data.duas.length)];
      document.getElementById('modal-message').innerHTML =
        `<div class="dua-arabic">${dua.arabic}</div>` +
        `<div class="dua-translation">${dua.translation}</div>` +
        `<div class="dua-source">${dua.source}</div>`;
    } else {
      document.getElementById('modal-message').textContent = rand(data.messages);
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay') ||
        e.target.classList.contains('overlay-bg')) {
      closeModal();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // subtle floating particles
  const colours = ['#F9C846','#6BA3BE','#E05C5C','#9B8BB4','#6DBF82','#C4A35A'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 14 + 6;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colours[i % colours.length]};
      animation-duration:${Math.random()*18+12}s;
      animation-delay:-${Math.random()*20}s;
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
